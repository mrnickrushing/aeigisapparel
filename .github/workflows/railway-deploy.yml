name: Railway Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      SENTRY_URL: https://sentry.io/
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_RELEASE: aegis-apparel@${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Validate Railway secrets
        run: |
          test -n "$RAILWAY_TOKEN" || (echo "Missing RAILWAY_TOKEN" && exit 1)
          test -n "$RAILWAY_PROJECT_ID" || (echo "Missing RAILWAY_PROJECT_ID" && exit 1)

      - name: Validate Sentry secrets
        run: |
          test -n "$SENTRY_ORG" || (echo "Missing SENTRY_ORG" && exit 1)
          test -n "$SENTRY_PROJECT" || (echo "Missing SENTRY_PROJECT" && exit 1)
          test -n "$SENTRY_AUTH_TOKEN" || (echo "Missing SENTRY_AUTH_TOKEN" && exit 1)

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend for Sentry artifacts
        working-directory: frontend
        run: yarn build

      - name: Deploy to Railway
        run: >
          npx -y @railway/cli@latest up --ci
          --project "$RAILWAY_PROJECT_ID"
          --service aegis-app
          --environment production

      - name: Create and finalize Sentry release
        working-directory: frontend
        run: |
          npx -y @sentry/cli@latest releases new "$SENTRY_RELEASE"
          npx -y @sentry/cli@latest releases set-commits "$SENTRY_RELEASE" --auto
          npx -y @sentry/cli@latest releases files "$SENTRY_RELEASE" upload-sourcemaps build/static/js build/static/css --rewrite --url-prefix "~/static"
          npx -y @sentry/cli@latest releases finalize "$SENTRY_RELEASE"
