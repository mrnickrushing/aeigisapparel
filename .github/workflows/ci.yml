name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-lint:
    name: Backend / Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: black --check
        working-directory: backend
        run: black --check .

      - name: isort --check-only
        working-directory: backend
        run: isort --check-only .

      - name: flake8
        working-directory: backend
        run: flake8 .

      - name: mypy (advisory — pre-existing type debt not yet fixed)
        working-directory: backend
        continue-on-error: true
        run: mypy --ignore-missing-imports .

  backend-test:
    name: Backend / Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URL: mongodb://127.0.0.1:27017
      DB_NAME: aegis_ci
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start API server
        working-directory: backend
        run: |
          nohup uvicorn server:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/ > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start" && cat server.log && exit 1

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v

      - name: Show server logs
        if: always()
        working-directory: backend
        run: cat server.log || true

  frontend-build:
    name: Frontend / Lint & Build
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build (CI=true fails on ESLint warnings)
        working-directory: frontend
        run: yarn build

  docker-build:
    name: Docker / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: aegisapparel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
